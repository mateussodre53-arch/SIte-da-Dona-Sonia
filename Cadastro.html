<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Cadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Cadastro</title>

</head>

<body>
<header>
        <nav class="area-navegacao">
            <img class="logo" src="/Imagens/logo dos bosrdados.png" alt="Logo do site" width="150px" height="110px">
            <ul>
                <li><a class="icones" href="index.html"><i class="fa-solid fa-house-chimney"></i></a></li>
                <li><a class="icones" href="#bordados"><i class="fa-solid fa-scissors"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-cart-arrow-down"></i></a></li>
                <li><a class="icones" href="Cadastro.html"><i class="fa-solid fa-user-gear"></i></a></li>
            </ul>
        </nav>
    </header>

    <main class="area-cadastro">
        <section class="area-titulo">
            <h1>Cadastro de usuário</h1>
        </section>

        <section class="area-formulario">
            <form action="#" class="form-cadastro ">

                <div class="area-nome formatacao">
                    <div class="primeiro-nome titulo-campo">
                        <label for="nome">nome</label> <!--labbel nome encima do botao--> <!-- for da pra clicar no nome ou na caixa-->
                        <input type="text" id="nome" placeholder="Digite seu nome" required> <!--campo para digitar-->
                    </div>

                    <div class="ultimo-nome titulo-campo">
                        <label for="sobrenome">sobrenome</label>
                        <input type="text" id="sobrenome" placeholder="digite seu sobrenome">
                    </div>
                </div>

                <div class="area-acesso formatacao"> <!--para criar direto usa div . ou # + nome da clase ou id-->
                    <div class="email titulo-campo">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="Digite seu E-mail" required>
                    </div>


                    <div class="senha titulo-campo">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="••••••••••••" required>
                    </div>
                </div>

                <div class="area-contato formatacao">
                    <div class="ddd titulo-campo">
                        <label for="ddd">ddd</label>
                        <input type="number" max="99" id="ddd" placeholder="ddd" required>
                    </div>
                    <div class="telefone titulo-campo">
                        <label for="telefone">telefone</label>
                        <input type="text" id="telefone" placeholder="Digite seu telefone" required>
                    </div>
                </div>

                <div class="area-endereco formatacao">
                    <div class="endereco-numero formatacao">
                        <div class="endereco titulo-campo">
                            <label for="endereco">endereço</label>
                            <input type="text" id="endereco" placeholder="digite seu endereço">
                        </div>
                        <div class="numero titulo-campo">
                            <label for="numero">Numero</label>
                            <input type="number" id="numero" placeholder="000">
                        </div>
                    </div>
                    <div class="cidade-cep formatacao">
                        <div class="cidade titulo-campo">
                            <label for="cidade">Cidade</label>
                            <input type="text" id="cidade" placeholder="cidade">
                        </div>

                        <div class="cep  titulo-campo">
                            <label for="CEP">CEP</label>
                            <input type="number" id="CEP" placeholder="00000-000">
                        </div>
                    </div>
                </div>

                <div class="area-dados formatacao">
                    <div class="data-nascimento titulo-campo">
                        <label for="data-nascimento">Data de nascimento</label>
                        <input type="date" id="data-nascimento" required>
                    </div>
                    <div class="genero titulo-campo">
                        <label for="genero">Genero</label>
                        <select id="genero" required>
                            <option value="#" disabled selected>Selecione seu genero</option>
                            <option value="#">Feminino</option>
                            <option value="#">Masculino</option>
                            <option value="#">Outro</option>
                            <option value="#">Batman</option>
                            <option value="#">Prefiro nao responder</option>
                        </select>
                    </div>
                </div>


                <div class="area-botao formatacao">
                    <button type="submit">cadastrar</button>
                    <a href="login.html" class="link-login">Já possui uma conta? Acesse agora !</a>
                </div>
            </form>
        </section>




    </main>

</body>

</html>
